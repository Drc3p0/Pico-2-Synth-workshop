  <circle cx="282" cy="240" r="5" fill="#E74C3C" stroke="#2ECC71" stroke-width="2"/>
  <rect x="145" y="233" width="125" height="14" rx="2" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="207" y="243" text-anchor="middle" class="pin-label-highlight" fill="#E74C3C">GP5 BTN4/SCL</text>
  <text x="140" y="243" text-anchor="end" class="pin-label" fill="#999">7</text>

