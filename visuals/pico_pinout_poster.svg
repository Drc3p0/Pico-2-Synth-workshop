  <rect x="175" y="365" width="95" height="14" rx="2" fill="#eee" stroke="#555" stroke-width="1"/>
  <text x="222" y="375" text-anchor="middle" class="pin-label" fill="#555">GND</text>
  <text x="170" y="375" text-anchor="end" class="pin-label" fill="#999">13</text>

  <!-- Pin 14: GP10 -->
  <circle cx="282" cy="394" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="387" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="397" text-anchor="middle" class="pin-label">GP10</text>
  <text x="170" y="397" text-anchor="end" class="pin-label" fill="#999">14</text>

