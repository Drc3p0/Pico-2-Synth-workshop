<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    .pin-label { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
    .pin-label-highlight { font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; fill: #222; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #555; }
    .legend-text { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #333; }
    .board-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .board-sublabel { font-family: Arial, Helvetica, sans-serif; font-size: 9px; fill: #ccc; }
  </style>
  <rect width="800" height="600" fill="#fff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Raspberry Pi Pico 2 — Pinout Reference</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Music Workshop Pin Assignments — Highlighted pins are used in this workshop</text>

  <!-- Legend -->
  <rect x="20" y="62" width="12" height="12" rx="2" fill="#E74C3C"/>
  <text x="36" y="73" class="legend-text">Buttons (GP2-5)</text>
  <rect x="140" y="62" width="12" height="12" rx="2" fill="#F39C12"/>
  <text x="156" y="73" class="legend-text">Audio PWM (GP15)</text>
  <rect x="290" y="62" width="12" height="12" rx="2" fill="#3498DB"/>
  <text x="306" y="73" class="legend-text">ADC (GP26-28)</text>
  <rect x="420" y="62" width="12" height="12" rx="2" fill="#2ECC71"/>
  <text x="436" y="73" class="legend-text">I2C (GP4/5 alt)</text>
  <rect x="550" y="62" width="12" height="12" rx="2" fill="#555"/>
  <text x="566" y="73" class="legend-text">GND</text>
  <rect x="630" y="62" width="12" height="12" rx="2" fill="#C0392B"/>
  <text x="646" y="73" class="legend-text">Power (3V3/VBUS)</text>

  <!-- Board body -->
  <rect x="270" y="90" width="260" height="480" rx="8" fill="#1a5e1a" stroke="#0d3d0d" stroke-width="2"/>
  <rect x="280" y="100" width="240" height="460" rx="4" fill="#1e6b1e" stroke="none"/>

  <!-- USB connector -->
  <rect x="365" y="82" width="70" height="20" rx="3" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">USB</text>

  <!-- Board text -->
  <text x="400" y="140" text-anchor="middle" class="board-label">Raspberry Pi</text>
  <text x="400" y="158" text-anchor="middle" class="board-label">Pico 2</text>
  <text x="400" y="175" text-anchor="middle" class="board-sublabel">RP2350</text>

  <!-- BOOTSEL button -->
  <circle cx="400" cy="200" r="10" fill="#444" stroke="#333" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#aaa">BOOT</text>

  <!-- LED -->
  <circle cx="400" cy="225" r="4" fill="#4a4" stroke="#333" stroke-width="0.5"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#ccc">LED</text>

  <!-- Pin holes - Left side (Pin 1 at top-left) -->
  <!-- Pin positions: 20 pins on each side, spaced 22px apart starting at y=108 -->

  <!-- LEFT SIDE PINS (top to bottom: Pin 1 to Pin 20) -->
  <!-- Pin 1: GP0 -->
  <circle cx="282" cy="108" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="101" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="111" text-anchor="middle" class="pin-label">GP0</text>
  <text x="170" y="111" text-anchor="end" class="pin-label" fill="#999">1</text>

  <!-- Pin 2: GP1 -->
  <circle cx="282" cy="130" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="123" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="133" text-anchor="middle" class="pin-label">GP1</text>
  <text x="170" y="133" text-anchor="end" class="pin-label" fill="#999">2</text>

  <!-- Pin 3: GND -->
  <circle cx="282" cy="152" r="5" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="175" y="145" width="95" height="14" rx="2" fill="#eee" stroke="#555" stroke-width="1"/>
  <text x="222" y="155" text-anchor="middle" class="pin-label" fill="#555">GND</text>
  <text x="170" y="155" text-anchor="end" class="pin-label" fill="#999">3</text>

  <!-- Pin 4: GP2 — BUTTON 1 -->
  <circle cx="282" cy="174" r="5" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <rect x="175" y="167" width="95" height="14" rx="2" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="222" y="177" text-anchor="middle" class="pin-label-highlight" fill="#E74C3C">GP2 BTN1</text>
  <text x="170" y="177" text-anchor="end" class="pin-label" fill="#999">4</text>

  <!-- Pin 5: GP3 — BUTTON 2 -->
  <circle cx="282" cy="196" r="5" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <rect x="175" y="189" width="95" height="14" rx="2" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="222" y="199" text-anchor="middle" class="pin-label-highlight" fill="#E74C3C">GP3 BTN2</text>
  <text x="170" y="199" text-anchor="end" class="pin-label" fill="#999">5</text>

  <!-- Pin 6: GP4 — BUTTON 3 / I2C SDA -->
  <circle cx="282" cy="218" r="5" fill="#E74C3C" stroke="#2ECC71" stroke-width="2"/>
  <rect x="145" y="211" width="125" height="14" rx="2" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="207" y="221" text-anchor="middle" class="pin-label-highlight" fill="#E74C3C">GP4 BTN3/SDA</text>
  <text x="140" y="221" text-anchor="end" class="pin-label" fill="#999">6</text>

