  <circle cx="282" cy="416" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="409" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
