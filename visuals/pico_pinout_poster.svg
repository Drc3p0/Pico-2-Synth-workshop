  <rect x="175" y="321" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="331" text-anchor="middle" class="pin-label">GP8</text>
  <text x="170" y="331" text-anchor="end" class="pin-label" fill="#999">11</text>

  <!-- Pin 12: GP9 -->
  <circle cx="282" cy="350" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="343" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="353" text-anchor="middle" class="pin-label">GP9</text>
  <text x="170" y="353" text-anchor="end" class="pin-label" fill="#999">12</text>

