  <circle cx="282" cy="262" r="5" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="175" y="255" width="95" height="14" rx="2" fill="#eee" stroke="#555" stroke-width="1"/>
  <text x="222" y="265" text-anchor="middle" class="pin-label" fill="#555">GND</text>
  <text x="170" y="265" text-anchor="end" class="pin-label" fill="#999">8</text>

  <!-- Pin 9: GP6 -->
  <circle cx="282" cy="284" r="5" fill="#ddd" stroke="#999" stroke-width="1"/>
  <rect x="175" y="277" width="95" height="14" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="222" y="287" text-anchor="middle" class="pin-label">GP6</text>
  <text x="170" y="287" text-anchor="end" class="pin-label" fill="#999">9</text>

